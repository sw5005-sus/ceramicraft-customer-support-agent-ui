server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy to CS Agent backend (cluster-internal service)
    # Only proxy POST requests; GET /chat falls through to SPA
    location /chat {
        if ($request_method != POST) {
            rewrite ^ /index.html last;
        }
        proxy_pass http://customer-support-agent-ms-svc:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /reset {
        if ($request_method != POST) {
            rewrite ^ /index.html last;
        }
        proxy_pass http://customer-support-agent-ms-svc:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /cs-agent/ {
        proxy_pass http://customer-support-agent-ms-svc:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy to User microservice (for oauth-callback)
    location /user-ms/ {
        proxy_pass http://user-ms-svc:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all other routes served by index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
